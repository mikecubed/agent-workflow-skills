name: Validate plugin

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**
      - fix/**

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate plugin
        run: npm run validate:plugin
